services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lexai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lexuz_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: lexai_api
    restart: unless-stopped
    env_file: ../.env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      # Access Ollama on host machine from container
      OLLAMA_BASE_URL: http://host.docker.internal:11434/v1
    ports:
      - "8000:8000"
    volumes:
      - ../logs:/app/logs
      - ../sessions:/app/sessions
      - ../lex_structured:/app/lex_structured
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "python database.py && python main.py"

volumes:
  pgdata:
